# Production stack: nginx (TLS + static SPA + API proxy), no source mounts,
# no dev servers. Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
# Put TLS certs in ./nginx/certs/{fullchain.pem,privkey.pem} first.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-russpeak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-russpeak}
      POSTGRES_DB: ${POSTGRES_DB:-russpeak}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-russpeak}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${S3_BUCKET:-russpeak-media};
      exit 0;
      "

  # Run migrations once, then exit.
  migrate:
    image: ghcr.io/abboskhanme/russian-speaking-backend:${IMAGE_TAG:-latest}
    build: ./backend
    command: alembic upgrade head
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  backend:
    image: ghcr.io/abboskhanme/russian-speaking-backend:${IMAGE_TAG:-latest}
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${BACKEND_WORKERS:-2}
    env_file: .env
    environment:
      ENV: production
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: ghcr.io/abboskhanme/russian-speaking-backend:${IMAGE_TAG:-latest}
    build: ./backend
    command: celery -A app.workers.celery_app.celery worker -B --loglevel=info --concurrency=${WORKER_CONCURRENCY:-4}
    env_file: .env
    environment:
      ENV: production
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app.celery inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  web:
    image: ghcr.io/abboskhanme/russian-speaking-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./certbot/www:/var/www/certbot:ro   # ACME HTTP-01 challenge files
      # Mount the config (it's also baked in) so edits apply on recreate/reload
      # without rebuilding the image — needed for the ACME challenge location.
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - minio
    restart: unless-stopped

  # Let's Encrypt client. On-demand only (profile keeps it out of `up`); the
  # default `certbot` entrypoint means args append: `run --rm certbot certonly …`.
  # See deploy/setup-domain.sh. Renew via cron (certbot renew).
  certbot:
    image: certbot/certbot:latest
    profiles: ["tools"]
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  backup:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - ./backups:/backups
    entrypoint:
      - /bin/sh
      - -c
      - |
        while true; do
          ts=$$(date +%Y%m%d_%H%M%S)
          PGPASSWORD=$${POSTGRES_PASSWORD:-russpeak} pg_dump -h db -U $${POSTGRES_USER:-russpeak} -d $${POSTGRES_DB:-russpeak} | gzip > /backups/russpeak_$$ts.sql.gz && echo "[backup] wrote russpeak_$$ts.sql.gz"
          find /backups -name 'russpeak_*.sql.gz' -mtime +7 -delete
          sleep 86400
        done
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
