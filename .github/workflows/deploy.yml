name: Deploy

# On every push to main: run the test suite, build the backend + web images in
# CI (NOT on the tiny VM), push them to GHCR, then SSH into the VM and swap the
# running containers. The VM only pulls finished images, so a redeploy is a
# ~15-30s swap instead of a multi-minute on-VM build.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/abboskhanme/russian-speaking-backend
  WEB_IMAGE: ghcr.io/abboskhanme/russian-speaking-web

jobs:
  # ── 1. Gate: never ship a broken build ──────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Ruff
        working-directory: backend
        run: ruff check .
      - name: Pytest
        working-directory: backend
        run: pytest -q
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Frontend deps
        working-directory: frontend
        run: npm install
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build (typecheck the bundle)
        working-directory: frontend
        run: npm run build

  # ── 2. Build both images once, push to GHCR (latest + immutable sha) ─
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile.prod
          push: true
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Swap the VM containers (skipped until DEPLOY_ENABLED=true) ────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Set repo Variable DEPLOY_ENABLED=true once the SSH secrets below exist.
    # Until then this job is skipped, so build-and-push still works standalone.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_DIR }}" 2>/dev/null || cd ~/russpeak
            IMAGE_TAG=${{ github.sha }} ./deploy/deploy.sh
