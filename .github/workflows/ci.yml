name: CI

# Pull-request checks. Pushes to main are tested + built + deployed by deploy.yml
# (so tests don't run twice on a merge).
on:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend (with dev extras)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .
      - name: Tests (pytest)
        working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build
