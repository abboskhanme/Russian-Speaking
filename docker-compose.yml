services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-russpeak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-russpeak}
      POSTGRES_DB: ${POSTGRES_DB:-russpeak}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # host 5433 → avoids clashing with another local Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-russpeak}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Creates the bucket on startup, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${S3_BUCKET:-russpeak-media};
      exit 0;
      "

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"   # host 8001 → avoids clashing with another local backend
    healthcheck:
      # python (already in the image) avoids needing curl installed.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app.celery worker -B --loglevel=info --concurrency=${WORKER_CONCURRENCY:-2}
    env_file: .env
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app.celery inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    environment:
      # Exposed to the browser as import.meta.env.VITE_GOOGLE_CLIENT_ID.
      # Set GOOGLE_CLIENT_ID in .env to enable the Google sign-in button.
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      - backend

  # Periodic Postgres backups → ./backups (kept 7 days). Runs pg_dump on a loop.
  backup:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - ./backups:/backups
    entrypoint:
      - /bin/sh
      - -c
      - |
        while true; do
          ts=$$(date +%Y%m%d_%H%M%S)
          PGPASSWORD=$${POSTGRES_PASSWORD:-russpeak} pg_dump -h db -U $${POSTGRES_USER:-russpeak} -d $${POSTGRES_DB:-russpeak} | gzip > /backups/russpeak_$$ts.sql.gz && echo "[backup] wrote russpeak_$$ts.sql.gz"
          find /backups -name 'russpeak_*.sql.gz' -mtime +7 -delete
          sleep 86400
        done
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
