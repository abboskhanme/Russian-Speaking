# Production reverse proxy: one public entry point that serves the built
# frontend and proxies the API + presigned-upload host. HTTPS is terminated here.
#
# Drop your certs at ./nginx/certs/fullchain.pem and ./nginx/certs/privkey.pem
# (Let's Encrypt, or self-signed for staging). For Let's Encrypt, run certbot
# against the server_name below and mount its live/ dir to /etc/nginx/certs.

upstream backend {
    server backend:8000;
}

# HTTP: serve Let's Encrypt ACME challenges; redirect everything else to HTTPS.
server {
    listen 80;
    server_name _;

    # certbot --webroot writes challenge files here (shared volume with certbot).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Allow reasonably large audio uploads (answers are small, but be safe).
    client_max_body_size 30m;

    # Security headers.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # API → FastAPI.
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Media objects → MinIO. The browser uploads/plays audio via presigned URLs
    # signed for THIS host (set S3_PUBLIC_URL=https://<your-domain>), so the path
    # is /<bucket>/<key>. Same origin as the SPA → no CORS needed. Keep this path
    # in sync with S3_BUCKET (default: russpeak-media).
    location /russpeak-media/ {
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Teacher video questions can be large; allow generous uploads. Keep the
        # mediaTooLarge client message and any S3 limits roughly in sync.
        client_max_body_size 200m;
        proxy_request_buffering off;
    }

    location = /health {
        proxy_pass http://backend/health;
    }

    # Everything else → the static SPA build, with client-side routing fallback.
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}
